name: Update STATUS.md

# Regenerates STATUS.md from the repo's Issues whenever issues/PRs change,
# plus once daily. Contributor analytics (commits/PRs per person) are already
# provided by GitHub under Insights -> Contributors / Pulse.

on:
  issues:
    types: [opened, closed, reopened, edited, labeled, unlabeled, deleted, assigned, unassigned]
  pull_request:
    types: [opened, closed, reopened, edited]
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: update-status
  cancel-in-progress: true

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate STATUS.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;

            const all = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'all', per_page: 100
            });
            const issues = all.filter(i => !i.pull_request); // drop PRs
            const has = (i, name) => i.labels.some(l => (l.name || l) === name);
            const bar = (done, total) => {
              const n = total ? Math.round((done / total) * 20) : 0;
              return '`' + '█'.repeat(n) + '░'.repeat(20 - n) + '`';
            };

            const phases = [
              ['phase-0: foundations', 'Phase 0 — Foundations'],
              ['phase-1: mvp',         'Phase 1 — MVP'],
              ['phase-2: social',      'Phase 2 — Social & iOS'],
              ['phase-3: trivselslekene', 'Phase 3 — Trivselslekene & gamification'],
              ['phase-4: money',       'Phase 4 — Money'],
            ];

            const closed = issues.filter(i => i.state === 'closed').length;
            let md = '';
            md += '# Project status\n\n';
            md += '_Auto-generated by `.github/workflows/update-status.yml` — do not edit by hand._\n\n';
            md += `Last updated: ${new Date().toISOString()}\n\n`;
            md += '## Overall\n\n';
            md += `${bar(closed, issues.length)} **${closed}/${issues.length}** issues closed\n\n`;

            md += '## By phase\n\n';
            md += '| Phase | Progress | Done / Total |\n|---|---|---|\n';
            for (const [label, title] of phases) {
              const inPhase = issues.filter(i => has(i, label));
              const done = inPhase.filter(i => i.state === 'closed').length;
              md += `| ${title} | ${bar(done, inPhase.length)} | ${done} / ${inPhase.length} |\n`;
            }

            const decisions = issues.filter(i => has(i, 'decision') && i.state === 'open');
            if (decisions.length) {
              md += '\n## Open decisions\n\n';
              for (const d of decisions) md += `- [#${d.number}](${d.html_url}) ${d.title}\n`;
            }

            const recent = [...issues]
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
              .slice(0, 8);
            md += '\n## Recent activity\n\n';
            for (const r of recent) {
              const who = r.assignee ? ` · @${r.assignee.login}` : '';
              md += `- ${r.state === 'closed' ? '✅' : '🔧'} [#${r.number}](${r.html_url}) ${r.title}${who}\n`;
            }

            md += '\n---\n';
            md += '_Per-person contributor stats: see **Insights → Contributors** and **Insights → Pulse**._\n';

            fs.writeFileSync('STATUS.md', md);

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain STATUS.md)" ]; then
            git add STATUS.md
            git commit -m "chore: update STATUS.md [skip ci]"
            git push
          else
            echo "STATUS.md already up to date."
          fi
